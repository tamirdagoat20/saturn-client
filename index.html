<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Saturn Client</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle, #1a0033, #050010);
    color: #d6b3ff;
    overflow: hidden;
}

/* 🌌 Stars */
body::before {
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:url("https://www.transparenttextures.com/patterns/stardust.png");
    animation:stars 100s linear infinite;
    opacity:0.3;
}
@keyframes stars {
    from{transform:translate(0,0);}
    to{transform:translate(-600px,-600px);}
}

/* 🔐 Login */
#auth {
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box {
    background:#120022;
    padding:30px;
    border-radius:12px;
    box-shadow:0 0 20px purple;
    text-align:center;
}

input {
    display:block;
    margin:10px auto;
    padding:10px;
    width:200px;
    background:black;
    border:1px solid purple;
    color:white;
}

button {
    padding:10px 20px;
    background:purple;
    color:white;
    border:none;
    cursor:pointer;
}

/* 🪟 Window */
.window {
    position:absolute;
    top:100px;
    left:200px;
    width:500px;
    background:#120022;
    border:1px solid purple;
    border-radius:10px;
    box-shadow:0 0 20px purple;
}

.header {
    padding:10px;
    cursor:move;
    background:#1f0033;
}

/* Tabs */
.tabs {
    display:flex;
    background:#0a001a;
}
.tab {
    padding:10px;
    cursor:pointer;
}
.tab:hover {
    background:purple;
}

/* Output */
.output {
    background:black;
    height:150px;
    overflow:auto;
    font-family:monospace;
    padding:10px;
}

/* Progress bar */
.bar {
    width:100%;
    background:#333;
    height:10px;
    margin-top:10px;
}
.fill {
    height:10px;
    width:0%;
    background:purple;
}

/* Saturn */
.planet {
    position:absolute;
    right:50px;
    top:50px;
    width:100px;
    height:100px;
    border-radius:50%;
    background:radial-gradient(circle,#ffcc99,#663300);
    animation:spin 20s linear infinite;
}
@keyframes spin {
    100% {transform:rotate(360deg);}
}
</style>
</head>

<body>

<!-- LOGIN / SIGNUP -->
<div id="auth">
    <div class="box">
        <h2>🪐 Saturn Client</h2>
        <input id="user" placeholder="Username">
        <input id="pass" type="password" placeholder="Password">
        <button onclick="signup()">Sign Up</button>
        <button onclick="login()">Login</button>
        <p id="status"></p>
    </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="window" id="win">
    <div class="header" onmousedown="drag(event)">Saturn System</div>

    <div class="tabs">
        <div class="tab" onclick="tab('core')">Core</div>
        <div class="tab" onclick="tab('ai')">AI</div>
        <div class="tab" onclick="tab('scan')">Scanner</div>
    </div>

    <div style="padding:10px;">
        <h3 id="title">System Ready</h3>

        <button onclick="run()">Run</button>
        <button onclick="downloadFake()">Download</button>

        <div class="bar"><div class="fill" id="fill"></div></div>

        <canvas id="graph" width="400" height="100"></canvas>

        <div class="output" id="output"></div>
    </div>
</div>

<div class="planet"></div>

</div>

<script>

/* 🔐 AUTH SYSTEM */
function signup(){
    let u = user.value;
    let p = pass.value;
    localStorage.setItem(u,p);
    status.innerText = "Account created!";
}

function login(){
    let u = user.value;
    let p = pass.value;
    if(localStorage.getItem(u) === p){
        status.innerText = "Access Granted";
        setTimeout(()=>{
            auth.style.display="none";
            app.style.display="block";
        },800);
    } else {
        status.innerText = "Invalid login";
    }
}

/* 🪟 DRAG */
function drag(e){
    let win = document.getElementById("win");
    document.onmousemove = function(ev){
        win.style.left = ev.clientX + "px";
        win.style.top = ev.clientY + "px";
    }
    document.onmouseup = ()=> document.onmousemove=null;
}

/* 📑 Tabs */
function tab(name){
    title.innerText = name.toUpperCase() + " MODULE";
}

/* 💻 Run simulation */
function run(){
    let output = document.getElementById("output");
    let fill = document.getElementById("fill");

    output.innerHTML="";
    fill.style.width="0%";

    let steps = [
        "Initializing...",
        "Connecting...",
        "Scanning layers...",
        "AI analyzing...",
        "Finalizing..."
    ];

    let i=0;
    let prog=0;

    let interval = setInterval(()=>{
        if(i < steps.length){
            output.innerHTML += steps[i]+"<br>";
            prog += 20;
            fill.style.width = prog+"%";
            i++;
        } else clearInterval(interval);
    },500);
}

/* 📊 Graph */
let ctx = graph.getContext("2d");
setInterval(()=>{
    ctx.clearRect(0,0,400,100);
    ctx.beginPath();
    for(let i=0;i<400;i++){
        let y = 50 + Math.sin((i+Date.now()/50)/20)*20;
        ctx.lineTo(i,y);
    }
    ctx.strokeStyle="purple";
    ctx.stroke();
},100);

/* 💾 Download */
function downloadFake(){
    alert("Downloading Saturn Client...");
}

</script>

</body>
</html>
