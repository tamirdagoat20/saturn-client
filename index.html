<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Saturn Client</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle at top, #2a004f, #0a001a 70%);
    color: #e6ccff;
    overflow: hidden;
}

/* 🌌 Animated stars */
body::before {
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:url("https://www.transparenttextures.com/patterns/stardust.png");
    animation:stars 120s linear infinite;
    opacity:0.25;
}
@keyframes stars {
    from{transform:translate(0,0);}
    to{transform:translate(-800px,-800px);}
}

/* 🔐 AUTH UI */
#auth {
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box {
    background: rgba(30,0,60,0.7);
    padding: 35px;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    box-shadow: 0 0 40px rgba(180,0,255,0.5);
    text-align:center;
    border:1px solid rgba(200,100,255,0.3);
}

.box h2 {
    margin-bottom: 15px;
}

input {
    display:block;
    margin:12px auto;
    padding:12px;
    width:220px;
    border-radius:10px;
    background:#0a001a;
    border:1px solid purple;
    color:white;
    outline:none;
}

button {
    padding:10px 20px;
    background:linear-gradient(90deg,#a855f7,#7e22ce);
    border:none;
    border-radius:10px;
    color:white;
    cursor:pointer;
    margin:5px;
    transition:0.2s;
}

button:hover {
    transform:scale(1.05);
}

/* 🪟 WINDOW */
.window {
    position:absolute;
    top:100px;
    left:200px;
    width:520px;
    background: rgba(30,0,60,0.75);
    border-radius:20px;
    backdrop-filter: blur(12px);
    border:1px solid rgba(200,100,255,0.3);
    box-shadow:0 0 30px rgba(180,0,255,0.4);
}

.header {
    padding:12px;
    cursor:move;
    background: rgba(60,0,100,0.5);
    border-top-left-radius:20px;
    border-top-right-radius:20px;
}

/* Tabs */
.tabs {
    display:flex;
    background:#140024;
}
.tab {
    padding:10px;
    cursor:pointer;
    flex:1;
    text-align:center;
}
.tab:hover {
    background:#7e22ce;
}

/* Output */
.output {
    background:black;
    height:170px;
    overflow:auto;
    font-family:monospace;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}

/* Progress */
.bar {
    width:100%;
    height:12px;
    background:#220033;
    border-radius:10px;
    overflow:hidden;
}
.fill {
    height:12px;
    width:0%;
    background:linear-gradient(90deg,#c084fc,#9333ea);
}

/* Saturn */
.planet {
    position:absolute;
    right:50px;
    top:50px;
    width:110px;
    height:110px;
    border-radius:50%;
    background:radial-gradient(circle,#ffcc99,#663300);
    animation:spin 25s linear infinite;
}
@keyframes spin {
    100% {transform:rotate(360deg);}
}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="auth">
    <div class="box">
        <h2>🪐 Saturn Client</h2>
        <input id="user" placeholder="Username">
        <input id="pass" type="password" placeholder="Password">
        <button onclick="signup()">Sign Up</button>
        <button onclick="login()">Login</button>
        <p id="status"></p>
    </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="window" id="win">
    <div class="header" onmousedown="drag(event)">Saturn Client</div>

    <div class="tabs">
        <div class="tab" onclick="tab('CORE')">Core</div>
        <div class="tab" onclick="tab('AI')">AI</div>
        <div class="tab" onclick="tab('SCAN')">Scanner</div>
        <div class="tab" onclick="tab('ENCRYPT')">Encrypt</div>
        <div class="tab" onclick="tab('NETWORK')">Network</div>
        <div class="tab" onclick="tab('CONTROL')">Control</div>
    </div>

    <div style="padding:15px;">
        <h3 id="title">System Ready</h3>

        <button onclick="run()">Run</button>
        <button onclick="downloadFake()">Download</button>

        <div class="bar"><div class="fill" id="fill"></div></div>

        <canvas id="graph" width="420" height="100"></canvas>

        <div class="output" id="output"></div>
    </div>
</div>

<div class="planet"></div>

</div>

<script>

/* AUTH */
function signup(){
    localStorage.setItem(user.value, pass.value);
    status.innerText = "Account created!";
}

function login(){
    if(localStorage.getItem(user.value) === pass.value){
        status.innerText = "Access Granted";
        setTimeout(()=>{
            auth.style.display="none";
            app.style.display="block";
        },800);
    } else {
        status.innerText = "Invalid login";
    }
}

/* DRAG */
function drag(e){
    document.onmousemove = (ev)=>{
        win.style.left = ev.clientX + "px";
        win.style.top = ev.clientY + "px";
    }
    document.onmouseup = ()=> document.onmousemove=null;
}

/* Tabs */
function tab(name){
    title.innerText = name + " MODULE ACTIVE";
}

/* RUN */
function run(){
    output.innerHTML="";
    fill.style.width="0%";

    let steps=[
        "[ INIT ] Booting Saturn...",
        "[ LINK ] Connecting nodes...",
        "[ SCAN ] Mapping layers...",
        "[ AI ] Running predictions...",
        "[ SEC ] Encrypting data...",
        "[ DONE ] Complete"
    ];

    let i=0, prog=0;

    let interval=setInterval(()=>{
        if(i<steps.length){
            output.innerHTML += steps[i]+"<br>";
            prog+=16;
            fill.style.width=prog+"%";
            i++;
        } else clearInterval(interval);
    },400);
}

/* Graph */
let ctx = graph.getContext("2d");
setInterval(()=>{
    ctx.clearRect(0,0,420,100);
    ctx.beginPath();
    for(let i=0;i<420;i++){
        let y = 50 + Math.sin((i+Date.now()/40)/15)*20;
        ctx.lineTo(i,y);
    }
    ctx.strokeStyle="#c084fc";
    ctx.stroke();
},100);

/* Download */
function downloadFake(){
    alert("Downloading Saturn Client...");
}

</script>

</body>
</html>
